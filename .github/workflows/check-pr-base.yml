name: Check PR base branch

on:
  pull_request:
    branches:
      - main
      - testing

jobs:
  check-base:
    runs-on: ubuntu-latest

    env:
      BASE_REF: ${{ github.base_ref }}
      HEAD_REF: ${{ github.head_ref }}

    steps:
      - name: Validate PR direction
        run: |
          echo "PR: $HEAD_REF → $BASE_REF"

          if [ "$BASE_REF" = "main" ] && [ "$HEAD_REF" != "testing" ]; then
            echo "❌ Solo se puede mergear a main desde testing"
            exit 1
          fi

          if [ "$BASE_REF" = "testing" ] && [ "$HEAD_REF" != "develop" ]; then
            echo "❌ Solo se puede mergear a testing desde develop"
            exit 1
          fi

          echo "✅ Dirección del PR correcta"
